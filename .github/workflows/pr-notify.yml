name: PR Notifications

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.event.action != 'edited' || contains(toJSON(github.event.changes), 'base') == false

    steps:
      - name: Send notification to Teams
        env:
          WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
          REPO: ${{ github.repository }}
          TITLE: ${{ github.event.pull_request.title }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          ACTOR: ${{ github.actor }}
          URL: ${{ github.event.pull_request.html_url }}
        run: |
          case "$ACTION" in
            opened)
              STATUS="Opened"
              ;;
            edited|synchronize)
              STATUS="Updated"
              ;;
            reopened)
              STATUS="Reopened"
              ;;
            closed)
              if [ "$MERGED" = "true" ]; then
                STATUS="Merged"
              else
                STATUS="Closed"
              fi
              ;;
          esac

          jq -n \
            --arg status "$STATUS" \
            --arg repo "$REPO" \
            --arg title "$TITLE" \
            --arg author "$AUTHOR" \
            --arg actor "$ACTOR" \
            --arg url "$URL" \
            '{
              type: "message",
              attachments: [{
                contentType: "application/vnd.microsoft.card.adaptive",
                content: {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  type: "AdaptiveCard",
                  version: "1.4",
                  body: (
                    [
                      { type: "TextBlock", text: ("PR " + $status), weight: "Bolder", size: "Medium" },
                      { type: "TextBlock", text: ("Repo: " + $repo), wrap: true },
                      { type: "TextBlock", text: ("Title: " + $title), wrap: true },
                      { type: "TextBlock", text: ("Author: " + $author), wrap: true }
                    ]
                    + (if $status == "Merged"
                       then [{ type: "TextBlock", text: ("Merged by: " + $actor), wrap: true }]
                       else [] end)
                    + [{ type: "TextBlock", text: $url, wrap: true }]
                  )
                }
              }]
            }' \
          | curl -fsS -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d @-